<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Classifieds Website{% endblock %}</title>
    <!-- We will use Tailwind CSS standalone CLI, outputting to static/css/output.css -->
    <link href="{{ url_for('static', path='/css/output.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-2xl font-black text-indigo-600 tracking-tighter">Market<span
                    class="text-slate-900">Place</span></a>

            <nav class="hidden md:flex gap-6 items-center">
                <a href="/" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors">Home</a>
                <a href="/search"
                    class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors">Categories</a>
                <a href="#" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors">About</a>
            </nav>

            <div class="flex items-center gap-4">
                <a href="#"
                    class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors hidden sm:block">Log
                    in</a>
                <a href="/post"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-full text-sm font-medium transition-all shadow-md shadow-indigo-200 hover:shadow-lg hover:-translate-y-0.5">Post
                    an Ad</a>
            </div>
        </div>
    </header>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 MarketPlace. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
